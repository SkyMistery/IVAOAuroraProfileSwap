<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Profile Swapper</title>
    <link rel="icon" type="image/svg+xml" href="img/it-symbol.svg" />
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <script>
        // Apply the saved theme before first paint to avoid a flash of the wrong theme.
        (function () {
            try {
                var t = localStorage.getItem("theme");
                if (t) document.documentElement.dataset.theme = t;
            } catch (e) { /* localStorage may be blocked; ignore */ }
        })();
    </script>
</head>

<body>
    <div id="app">
        <div class="loading">Loading…</div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Triggers a browser download of raw bytes provided as a base64 string.
        window.downloadFileFromBase64 = (fileName, base64) => {
            const bytes = atob(base64);
            const buffer = new Uint8Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) buffer[i] = bytes.charCodeAt(i);
            const blob = new Blob([buffer], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        // Persisted UI preferences (theme + language) via localStorage.
        window.appPrefs = {
            getTheme: () => { try { return localStorage.getItem("theme") || ""; } catch { return ""; } },
            setTheme: (v) => {
                try { localStorage.setItem("theme", v); } catch { /* ignore */ }
                document.documentElement.dataset.theme = v;
            },
            getLang: () => { try { return localStorage.getItem("lang") || ""; } catch { return ""; } },
            setLang: (v) => { try { localStorage.setItem("lang", v); } catch { /* ignore */ } },
            scrollToId: (id) => document.getElementById(id)?.scrollIntoView({ behavior: "smooth", block: "start" })
        };
    </script>
</body>

</html>
