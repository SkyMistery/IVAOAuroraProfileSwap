name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run tests
        run: dotnet test tests/AuroraProfileSwapper.Core.Tests/AuroraProfileSwapper.Core.Tests.csproj -c Release

      - name: Publish Blazor WASM
        run: dotnet publish src/AuroraProfileSwapper.Web/AuroraProfileSwapper.Web.csproj -c Release -o publish

      # For a project page the site lives at https://<user>.github.io/<repo>/,
      # so the <base href> must be "/<repo>/". Rewrite it from "/".
      - name: Fix base href for project page
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          sed -i "s|<base href=\"/\" />|<base href=\"/$REPO/\" />|g" publish/wwwroot/index.html

      # Jekyll ignores files/folders starting with underscore (e.g. _framework); disable it.
      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      # SPA fallback so deep links don't 404.
      - name: SPA 404 fallback
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
